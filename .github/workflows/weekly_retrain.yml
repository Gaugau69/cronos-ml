name: Weekly retrain

on:
  schedule:
    - cron: '0 3 * * 1'  # chaque lundi à 3h UTC
  workflow_dispatch:       # déclenchement manuel depuis GitHub Actions

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger retrain
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.CRONOS_ML_URL }}/retrain" \
            -H "x-secret: ${{ secrets.CRONOS_ML_SECRET }}")
          echo "HTTP status: $response"
          if [ "$response" != "200" ]; then
            echo "Retrain trigger failed with status $response"
            exit 1
          fi
          echo "Retrain triggered successfully"
